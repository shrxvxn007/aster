# Aster CI: build + test on Ubuntu and macOS in Release. Runs a loose
# Release throughput floor check on Linux, a clang-tidy gate on Linux
# Release, and uses ccache to keep rebuilds under a minute. Sanitizer
# coverage (ASan + UBSan) is available locally via `Debug` build but is
# intentionally NOT exercised in CI \u2014 instrumented -O0 binaries are
# prohibitively slow under ctest on macOS runners.\n

name: CIon:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Refresh offline CI artifacts every 6 hours, skewed 13 minutes past
  # the hour to dodge GitHub's top-of-hour Action queue congestion.
  schedule:
    - cron: '13 */6 * * *'
  # Manual trigger for an immediate refresh between scheduled runs.
  workflow_dispatch:
    inputs:
      runs:
        description: 'Number of recent runs to capture into ci/'
        required: false
        default: '3'




permissions:
  contents: read

jobs:
  # --------------------------------------------------------------------------
  # Main build + test matrix.
  # --------------------------------------------------------------------------
  build:
    # CI runs Release across both OSes (production-proxy) and Debug on
    # Ubuntu only so UBSan coverage is exercised in CI. macOS + Debug is
    # dropped from the matrix because (a) Apple Clang UBSan runtime
    # overhead remains higher than gcc on Linux, and (b) the bugs UBSan
    # catches are compiler-independent (signed integer overflow, null,
    # alignment, invalid shift) so one gating architecture suffices.
    # CMakeLists.txt uses -O1 -g for Debug, which runs the per-test
    # wallclock under 5 s with UBSan-only.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        build_type: [Release]
        include:
          - os: ubuntu-latest
            build_type: Debug

    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install ccache (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y ccache

      - name: Install ccache (macOS)
        if: matrix.os == 'macos-latest'
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
          HOMEBREW_NO_INSTALL_CLEANUP: 1
        run: brew install ccache

      # Set the ccache directory via the step-level env: block so it's
      # available to every subsequent `run:` action. Writing to $GITHUB_ENV
      # from inside a step does NOT export back into the same step's shell
      # (the prior `echo ... >> $GITHUB_ENV` pattern was the root cause of
      # `mkdir: cannot create directory ''` in earlier runs).
      - name: Configure ccache
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
        run: |
          ccache --set-config=max_size=200M
          mkdir -p "$CCACHE_DIR"

      - name: Configure CMake (ccache)
        run: >
          cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build --parallel $(nproc 2>/dev/null || sysctl -n hw.ncpu)

      - name: Test
        working-directory: build
        # --timeout 120: per-test wallclock cap. 60s was flagged as borderline-
        # aggressive for any future contributor adding a slower test. 120s
        # gives ~2x headroom and still catches hangs.
        run: ctest --output-on-failure --timeout 120

      - name: ccache stats
        if: matrix.os == 'ubuntu-latest' && matrix.build_type == 'Release'
        run: ccache --show-stats --verbose | tail -20

  # --------------------------------------------------------------------------
  # Loose throughput floor check — only on Linux Release to avoid CI
  # flakiness from shared macOS runners.
  # --------------------------------------------------------------------------
  perf-floor:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ccache
        run: sudo apt-get update && sudo apt-get install -y ccache

      - name: Configure ccache (perf-floor)
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
        run: |
          ccache --set-config=max_size=200M
          mkdir -p "$CCACHE_DIR"

      - name: Configure (Release)
        run: >
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Run throughput floor check
        working-directory: build
        run: |
          output=$(./aster_sim --events 1000000)
          echo "$output"
          throughput=$(echo "$output" | awk '/Throughput:/{print $2}')
          if [ -z "$throughput" ]; then
            echo "Failed to parse throughput"
            exit 1
          fi
          floor=10.0
          cmp=$(echo "$throughput $floor" | awk '{if ($1 >= $2) print "ok"; else print "fail"}')
          if [ "$cmp" != "ok" ]; then
            echo "Throughput $throughput M events/s below floor $floor M events/s"
            exit 1
          fi
          echo "Throughput floor check passed: $throughput M events/s >= $floor M events/s"

      # ------------------------------------------------------------------
      # Strategy-layer regression gate: replay a deterministic ITCH stream
      # produced by scripts/generate_test_itch.py and assert the Analytics
      # block matches tests/golden/analytics_ci.json within per-field
      # tolerances. Stdlib-only Python; no extra deps to install.
      # ------------------------------------------------------------------
      - name: Strategy regression gate
        run: |
          set -e
          python3 scripts/generate_test_itch.py --out /tmp/ci.itch --seconds 5
          ./build/aster_replay --itch-file /tmp/ci.itch --speed batch > /tmp/ci.out 2>&1 || true
          echo '--- replay output (last 20 lines) ---'
          tail -20 /tmp/ci.out
          python3 scripts/check_replay_golden.py tests/golden/analytics_ci.json /tmp/ci.out

  # --------------------------------------------------------------------------
  # clang-tidy static-analysis gate. Only Linux Release to keep runtimes
  # reasonable; macOS clang-tidy is also fine but skipped to keep CI fast.
  # --------------------------------------------------------------------------
  lint:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-tidy
        run: sudo apt-get update && sudo apt-get install -y clang-tidy

      - name: Configure (compile_commands generation)
        run: >
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run clang-tidy
        # `bugprone-*,cppcoreguidelines-*,performance-*,readability-*` is the
        # default checkset with `clang-tidy` minus modernize-* (we use C++20
        # features clang-tidy -modernize can flag).
        run: |
          set -e
          targets=(
            "src/core/types.cpp"
            "src/replay/parser.cpp"
            "src/replay/replay_engine.cpp"
            "src/strategy/analytics.cpp"
            "src/strategy/mm_strategy.cpp"
            "src/strategy/risk_manager.cpp"
            "src/strategy/backtest.cpp"
            "src/main.cpp"
            "src/sim.cpp"
          )
          files=()
          for t in "${targets[@]}"; do
            [ -f "$t" ] && files+=("$t")
          done
          clang-tidy --quiet -p build "${files[@]}"

  # ----------------------------------------------------------------------
  # Offline CI mirror refresh. Triggered by cron every 6 hours (skewed
  # 13 minutes past the hour to dodge GitHub's top-of-hour Action queue
  # congestion) or by workflow_dispatch for an immediate refresh. The
  # job rebuilds only aster_sim so perf_floor_local.txt is a real captured
  # measurement rather than a placeholder. We don't include any of the
  # build / perf-floor / lint work here because each existing job is
  # gated to push / pull_request events via `if:` filters below.
  # ----------------------------------------------------------------------
  capture-ci:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # commit + push regenerated ci/ artifacts
      actions: read    # gh run list / gh run view API scopes
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    concurrency:
      group: capture-ci-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Install gh CLI + jq
        run: sudo apt-get update && sudo apt-get install -y gh jq

      - name: Build aster_sim (for perf_floor_local.txt)
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --target aster_sim --parallel

      - name: Refresh ci/ artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # `inputs.runs` is only valid on workflow_dispatch; for the cron
          # path we fall back to the default of 3 to keep the offline
          # snapshot small.
          CAPTURE_RUNS: ${{ github.event_name == 'workflow_dispatch' && inputs.runs || '3' }}
        run: |
          echo "$GH_TOKEN" | gh auth login --with-token
          ./scripts/capture_ci.sh --runs "$CAPTURE_RUNS"

      - name: Commit + push regenerated ci/
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add ci/
          if ! git diff --cached --quiet; then
            git commit -m "ci: refresh offline artifacts $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            # Pull --rebase first to defuse parallel-developer-push races
            # (cron job started a few seconds before a developer pushed).
            git pull --rebase origin "${{ github.ref }}" 2>/dev/null || true
            git push
          else
            echo "no ci/ changes since last refresh"
          fi
